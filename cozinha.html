<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esfihas Delivery - Cozinha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/db.js"></script>
    <script src="js/sidebar.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#120c08',
                            card: '#1a120e',
                            border: '#2a1e17',
                            accentOrange: '#f97316'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        main > div:first-child p {
            display: none;
        }

        main > div:first-child h2 {
            font-size: 1.25rem;
        }
    </style>
</head>

<body class="bg-brand-dark text-gray-200 font-sans antialiased min-h-screen flex flex-col md:flex-row">

    <!-- BARRA LATERAL -->
    <aside
        class="w-full md:w-64 bg-brand-card border-r border-brand-border flex flex-col justify-between shrink-0 p-5 z-20">
        <div>
            <div class="flex items-center gap-3 mb-8">
                <div
                    class="w-10 h-10 rounded-full bg-gradient-to-br from-red-600 to-orange-500 flex items-center justify-center shadow-lg">
                    <span class="text-white font-black text-xl">S</span>
                </div>
                <div>
                    <span class="text-xs uppercase text-brand-accentOrange tracking-wider font-bold">Esfiha</span>
                    
                </div>
            </div>
            <nav class="space-y-1">
                <a href="index.html"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all font-semibold text-sm">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
                </a>
                <a href="pedidos.html"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all font-semibold text-sm">
                    <i data-lucide="shopping-cart" class="w-5 h-5"></i> Pedidos
                </a>
                <a href="cozinha.html"
                    class="bg-gradient-to-br from-red-600 to-orange-500 text-white w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm">
                    <i data-lucide="chef-hat" class="w-5 h-5"></i> Cozinha
                </a>
                <a href="sabores.html"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all font-semibold text-sm">
                    <i data-lucide="pizza" class="w-5 h-5"></i> Sabores
                </a>
                <a href="clientes.html"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all font-semibold text-sm">
                    <i data-lucide="users" class="w-5 h-5"></i> Clientes
                </a>
                <a href="relatorios.html"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all font-semibold text-sm">
                    <i data-lucide="bar-chart-3" class="w-5 h-5"></i> Relatórios
                </a>
                <a href="financeiro.html"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all font-semibold text-sm">
                    <i data-lucide="dollar-sign" class="w-5 h-5"></i> Financeiro
                </a>
            </nav>
        </div>
    </aside>

    <main class="flex-1 p-3 md:p-4 overflow-hidden max-h-screen space-y-3">
        <div class="flex items-center justify-between gap-3">
            <h2 class="text-2xl font-black text-white">Visualização da Cozinha</h2>
            <p class="text-gray-400 text-sm">Monitorização e preparação de esfihas em tempo real.</p>
        </div>

        <div class="grid grid-cols-1 gap-3">
            <!-- Fila -->
            <div class="bg-brand-card p-2 md:p-3 rounded-2xl border border-brand-border h-[calc(100vh-7.5rem)] flex flex-col">
                <h3
                    class="font-bold text-white text-sm border-b border-brand-border px-1 pb-2 mb-2 flex justify-between items-center">
                    <span>Fila de Espera</span>
                    <span id="c-pendente" class="bg-red-500/15 text-red-400 px-2.5 py-0.5 rounded-full text-sm">0</span>
                </h3>
                <div id="list-pendente" class="flex-1 space-y-2 overflow-y-auto pr-1"></div>
            </div>
        </div>
    </main>

    <script>
        let orders = [];
        let flavors = [];

        document.addEventListener('DOMContentLoaded', async () => {
            try { await initDb(); }
            catch (e) { showToast('Erro de conexão', 'Falha ao conectar ao servidor.', true); console.error(e); return; }
            onDataChange(() => { syncCache(); renderKanban(); });
            syncCache();
            renderKanban();
            lucide.createIcons();
        });

        function syncCache() {
            orders = getOrders();
            flavors = getFlavors();
        }

        function getItemCategory(item) {
            const flavor = flavors.find(f => f.id === item.flavorId)
                || flavors.find(f => String(f.name || '').toLowerCase() === String(item.name || '').toLowerCase());
            return flavor && flavor.category === 'Doce' ? 'Doce' : 'Salgada';
        }

        function renderGroupedItems(items) {
            const groups = [
                { title: 'Salgadas', items: [] },
                { title: 'Doces', items: [] },
            ];

            (items || []).forEach(item => {
                const target = getItemCategory(item) === 'Doce' ? groups[1] : groups[0];
                target.items.push(item);
            });

            return `
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-x-8 gap-y-3">
                    ${groups.map(group => `
                        <div class="space-y-1">
                            <div class="text-[10px] uppercase tracking-wider text-gray-500 font-black">${group.title}</div>
                            <div class="space-y-1">
                                ${group.items.length > 0
                                    ? group.items.map(i => `
                                        <div class="flex items-center gap-2 min-w-0 leading-none">
                                            <span class="text-gray-950 font-black shrink-0 leading-none" style="font-size: clamp(36px, 3.6vw, 48px);">${i.quantity}x</span>
                                            <span class="text-white font-black leading-none break-words" style="font-size: clamp(32px, 3.2vw, 44px);">${escapeHtml(i.name)}</span>
                                        </div>
                                    `).join('')
                                    : `<div class="text-sm text-gray-400">Nenhuma</div>`
                                }
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderKanban() {
            const listPendente = document.getElementById('list-pendente');

            listPendente.innerHTML = '';
            let p = 0;

            // Mostra pedidos ativos (não entregues/cancelados). Se o pedido não é de hoje,
            // ainda assim deve aparecer (ex: pedido pendente que ficou para trás).
            orders.forEach(order => {
                if (['Cancelado', 'Entregue'].includes(order.status)) return;
                const isOld = !isToday(order.createdAt);

                const card = document.createElement('div');
                card.className = "bg-brand-dark p-3 rounded-xl border border-brand-border space-y-2";
                if (isOld) card.classList.add('opacity-80');
                const itemsList = renderGroupedItems(order.items);
                const totalItems = (order.items || []).reduce((sum, item) => sum + Number(item.quantity || 0), 0);
                const notes = String(order.notes || '').trim();
                const notesBlock = notes
                    ? `
                        <div class="flex items-start gap-2 rounded-lg border border-amber-400/50 bg-amber-50 px-3 py-2">
                            <div class="shrink-0 text-[10px] font-black uppercase text-amber-700">
                                <i data-lucide="message-square-text" class="w-4 h-4"></i>
                                Observações
                            </div>
                            <p class="whitespace-pre-wrap text-sm font-bold leading-snug text-amber-950">${escapeHtml(notes)}</p>
                        </div>
                    `
                    : '';

                const prev = previousStatus(order.status);
                const next = nextStatus(order.status);
                const backBtn = prev
                    ? `<button onclick="rewind('${escapeHtml(order.id)}')" class="bg-brand-border hover:bg-gray-600 hover:text-white py-2 px-3 rounded-lg text-xs font-bold transition-all text-gray-300" title="Voltar para ${escapeHtml(prev)}">←</button>`
                    : '';
                const fwdBtn = next
                    ? `<button onclick="advance('${escapeHtml(order.id)}')" class="flex-1 bg-brand-border hover:bg-brand-accentOrange hover:text-white py-2 rounded-lg text-xs font-bold transition-all">Avançar →</button>`
                    : '';

                card.innerHTML = `
                    <div class="flex items-center justify-between gap-3">
                        <div class="flex items-center gap-2">
                        <span class="rounded-full px-2 py-0.5 text-[10px] font-black uppercase ${order.status === 'Em Preparo' ? 'bg-orange-100 text-orange-700' : 'bg-red-100 text-red-700'}">${escapeHtml(order.status)}</span>
                        ${isOld ? `<div class="text-[10px] text-gray-500 mt-0.5">Pedido antigo • ${formatTime(order.createdAt)}</div>` : ``}
                        </div>
                        <div class="flex gap-1.5">${backBtn}${fwdBtn}</div>
                    </div>
                    <div class="flex items-baseline gap-2">
                        <span class="text-brand-accentOrange font-black leading-none" style="font-size: clamp(32px, 3.2vw, 44px);">${totalItems}</span>
                        <span class="text-white font-black leading-none" style="font-size: clamp(32px, 3.2vw, 44px);">esfihas</span>
                        <span class="ml-2 text-brand-accentOrange font-black leading-none" style="font-size: clamp(32px, 3.2vw, 44px);">${escapeHtml(order.id)}</span>
                        <span class="ml-2 text-sm font-black text-gray-700">${escapeHtml(order.customer)}</span>
                    </div>
                    <div class="border-t border-brand-border/40 pt-2 space-y-2">${itemsList}</div>
                    ${notesBlock}
                `;

                if (['Pendente', 'Em Preparo'].includes(order.status)) {
                    listPendente.appendChild(card);
                    p++;
                }
            });

            document.getElementById('c-pendente').textContent = p;
            lucide.createIcons();
        }

        async function advance(id) {
            const order = orders.find(o => o.id === id);
            if (!order) return;
            const next = nextStatus(order.status);
            if (!next) return;
            try {
                await updateOrder(id, { status: next });
                showToast('Atualizado', `Pedido ${id} → ${next}.`);
            } catch (e) {
                showToast('Erro', e.message, true);
            }
        }

        async function rewind(id) {
            const order = orders.find(o => o.id === id);
            if (!order) return;
            const prev = previousStatus(order.status);
            if (!prev) return;
            try {
                await updateOrder(id, { status: prev });
                showToast('Revertido', `Pedido ${id} ← ${prev}.`);
            } catch (e) {
                showToast('Erro', e.message, true);
            }
        }
    </script>
</body>

</html>
