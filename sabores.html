<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esfihas Delivery - Sabores</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/db.js"></script>
    <script src="js/sidebar.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#120c08',
                            card: '#1a120e',
                            border: '#2a1e17',
                            accentOrange: '#f97316'
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-brand-dark text-gray-200 font-sans antialiased min-h-screen flex flex-col md:flex-row">

    <!-- BARRA LATERAL -->
    <aside
        class="w-full md:w-64 bg-brand-card border-b md:border-b-0 md:border-r border-brand-border flex flex-col justify-between shrink-0 p-5 z-20">
        <div>
            <div class="flex items-center gap-3 mb-8">
                <div
                    class="w-10 h-10 rounded-full bg-gradient-to-br from-red-600 to-orange-500 flex items-center justify-center shadow-lg">
                    <span class="text-white font-black text-xl">S</span>
                </div>
                <div>
                    <span class="text-xs uppercase text-brand-accentOrange tracking-wider font-bold">Esfiha</span>
                    
                </div>
            </div>
            <nav class="space-y-1">
                <a href="./index.html"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all font-semibold text-sm">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
                </a>
                <a href="./pedidos.html"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all font-semibold text-sm">
                    <i data-lucide="shopping-cart" class="w-5 h-5"></i> Pedidos
                </a>
                <a href="./cozinha.html"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all font-semibold text-sm">
                    <i data-lucide="chef-hat" class="w-5 h-5"></i> Cozinha
                </a>
                <a href="./sabores.html"
                    class="bg-gradient-to-br from-red-600 to-orange-500 text-white w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm">
                    <i data-lucide="pizza" class="w-5 h-5"></i> Sabores
                </a>
                <a href="./clientes.html"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all font-semibold text-sm">
                    <i data-lucide="users" class="w-5 h-5"></i> Clientes
                </a>
                <a href="./relatorios.html"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all font-semibold text-sm">
                    <i data-lucide="bar-chart-3" class="w-5 h-5"></i> Relatórios
                </a>
                <a href="./financeiro.html"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all font-semibold text-sm">
                    <i data-lucide="dollar-sign" class="w-5 h-5"></i> Financeiro
                </a>
            </nav>
        </div>
    </aside>

    <main class="flex-1 p-6 md:p-8 overflow-y-auto max-h-screen space-y-6">
        <!-- HEADER -->
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
            <div>
                <h2 class="text-2xl font-black text-white">Menu & Sabores</h2>
                <p class="text-gray-400 text-sm">Portfólio completo de esfihas doces, salgadas e especiais.</p>
            </div>
            <div class="flex items-center gap-2 self-start sm:self-auto">
                <button onclick="openBaseCostsModal()"
                    class="border border-brand-border text-gray-300 hover:text-white hover:bg-white/5 font-bold py-2.5 px-5 rounded-xl flex items-center justify-center gap-2 text-sm transition-all">
                    <i data-lucide="settings" class="w-4 h-4"></i> Custos base
                </button>
                <button onclick="openNewFlavorModal()"
                    class="bg-gradient-to-r from-red-600 to-orange-500 hover:opacity-90 active:scale-95 transition-all text-white font-bold py-2.5 px-5 rounded-xl flex items-center justify-center gap-2 text-sm shadow-lg">
                    <i data-lucide="plus" class="w-4 h-4"></i> Adicionar Sabor
                </button>
            </div>
        </div>

        <!-- FILTROS E PESQUISA -->
        <div
            class="bg-brand-card p-4 rounded-2xl border border-brand-border flex flex-col md:flex-row gap-4 items-center justify-between">
            <div class="relative w-full md:w-80">
                <i data-lucide="search" class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 w-4 h-4"></i>
                <input type="text" id="search-input" oninput="filterFlavors()" placeholder="Buscar esfiha..."
                    class="w-full bg-brand-dark border border-brand-border rounded-xl pl-10 pr-4 py-2.5 text-white focus:outline-none focus:border-brand-accentOrange text-sm transition-all">
            </div>
            <div class="flex items-center gap-2 w-full md:w-auto overflow-x-auto pb-1 md:pb-0">
                <button onclick="setCategoryFilter('Todos')" id="filter-all"
                    class="px-4 py-2 text-xs font-bold rounded-xl transition-all border border-brand-accentOrange bg-brand-accentOrange text-white shrink-0">
                    Todos
                </button>
                <button onclick="setCategoryFilter('Salgada')" id="filter-salgada"
                    class="px-4 py-2 text-xs font-bold rounded-xl transition-all border border-brand-border hover:border-gray-500 text-gray-400 hover:text-white shrink-0">
                    Salgadas
                </button>
                <button onclick="setCategoryFilter('Doce')" id="filter-doce"
                    class="px-4 py-2 text-xs font-bold rounded-xl transition-all border border-brand-border hover:border-gray-500 text-gray-400 hover:text-white shrink-0">
                    Doces
                </button>
                <button onclick="setCategoryFilter('Premium')" id="filter-premium"
                    class="px-4 py-2 text-xs font-bold rounded-xl transition-all border border-brand-border hover:border-gray-500 text-gray-400 hover:text-white shrink-0">
                    Premium
                </button>

            </div>
        </div>

        <!-- GRID DOS SABORES -->
        <div id="sabores-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </main>

    <!-- MODAL NOVO SABOR -->
    <div id="modal-flavor"
        class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-brand-card w-full max-w-md rounded-2xl border border-brand-border overflow-hidden shadow-2xl">
            <div class="p-5 border-b border-brand-border flex items-center justify-between bg-black/20">
                <h3 class="text-white font-bold text-lg">Adicionar Novo Sabor</h3>
                <button onclick="closeNewFlavorModal()" class="text-gray-400 hover:text-white"><i data-lucide="x"
                        class="w-6 h-6"></i></button>
            </div>
            <div class="p-5 space-y-4">
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-gray-400 uppercase">Nome da Esfiha</label>
                    <input type="text" id="f-name" placeholder="Ex: Frango com Requeijão"
                        class="w-full bg-brand-dark border border-brand-border rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand-accentOrange text-sm">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-gray-400 uppercase">Preço (R$)</label>
                        <input type="number" step="0.10" id="f-price" placeholder="Ex: 5.90"
                            class="w-full bg-brand-dark border border-brand-border rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand-accentOrange text-sm">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-gray-400 uppercase">Recheio (R$)</label>
                        <input type="number" step="0.10" id="f-cost" placeholder="Ex: 1.89"
                            class="w-full bg-brand-dark border border-brand-border rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand-accentOrange text-sm">
                    </div>
                </div>
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-gray-400 uppercase">Categoria</label>
                    <select id="f-category"
                        class="w-full bg-brand-dark border border-brand-border rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand-accentOrange text-sm">
                        <option value="Salgada">Salgada</option>
                        <option value="Doce">Doce</option>
                        <option value="Premium">Premium</option>
                        <option value="Especial">Especial</option>
                    </select>
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-gray-400 uppercase">Ingredientes / Descrição</label>
                    <textarea id="f-ingredients"
                        placeholder="Ex: Peito de frango desfiado com requeijão cremoso e orégano" rows="2"
                        class="w-full bg-brand-dark border border-brand-border rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand-accentOrange text-sm resize-none"></textarea>
                </div>
            </div>
            <div class="p-5 border-t border-brand-border flex justify-end gap-3 bg-black/20">
                <button onclick="closeNewFlavorModal()"
                    class="border border-brand-border text-gray-400 hover:text-white px-4 py-2 rounded-xl text-xs font-semibold">Cancelar</button>
                <button onclick="submitNewFlavor()"
                    class="bg-gradient-to-r from-red-600 to-orange-500 hover:opacity-90 text-white font-bold px-5 py-2 rounded-xl text-xs">Criar
                    Sabor</button>
            </div>
        </div>
    </div>

    <!-- TOAST DE NOTIFICAÇÃO -->
    <div id="toast"
        class="fixed bottom-5 right-5 bg-brand-card border border-brand-border text-white px-5 py-4 rounded-xl shadow-2xl flex items-center gap-3 translate-y-20 opacity-0 transition-all duration-300 z-50 pointer-events-none">
        <div id="toast-icon-container" class="w-8 h-8 rounded-full flex items-center justify-center">
            <i id="toast-icon" data-lucide="check" class="w-5 h-5 text-white"></i>
        </div>
        <div>
            <h4 id="toast-title" class="font-bold text-sm"></h4>
            <p id="toast-desc" class="text-gray-400 text-xs mt-0.5"></p>
        </div>
    </div>

    <!-- MODAL: Custos base (iguais para todas as esfihas) -->
    <div id="modal-base-costs" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-brand-card w-full max-w-md rounded-2xl border border-brand-border overflow-hidden shadow-2xl">
            <div class="p-5 border-b border-brand-border flex items-center justify-between bg-black/20">
                <div>
                    <h3 class="text-white font-bold text-lg">Custos base</h3>
                    <p class="text-xs text-gray-500">Aplicados em todas as esfihas (o recheio varia por sabor).</p>
                </div>
                <button onclick="closeBaseCostsModal()" class="text-gray-400 hover:text-white"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <div class="p-5 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-gray-400 uppercase">Massa (R$)</label>
                        <input type="number" step="0.01" min="0" id="base-dough" oninput="_renderBaseTotal()"
                            class="w-full bg-brand-dark border border-brand-border rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand-accentOrange text-sm">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-gray-400 uppercase">Embalagem (R$)</label>
                        <input type="number" step="0.01" min="0" id="base-packaging" oninput="_renderBaseTotal()"
                            class="w-full bg-brand-dark border border-brand-border rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand-accentOrange text-sm">
                    </div>
                </div>
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-gray-400 uppercase">Gás (R$)</label>
                    <input type="number" step="0.01" min="0" id="base-gas" oninput="_renderBaseTotal()"
                        class="w-full bg-brand-dark border border-brand-border rounded-xl px-4 py-3 text-white focus:outline-none focus:border-brand-accentOrange text-sm">
                    <p class="text-[11px] text-gray-500">Custo base total: <span id="base-total" class="text-white font-bold">R$ 0,00</span></p>
                </div>
            </div>
            <div class="p-5 border-t border-brand-border flex justify-end gap-3 bg-black/20">
                <button onclick="closeBaseCostsModal()" class="border border-brand-border text-gray-400 hover:text-white px-4 py-2 rounded-xl text-xs font-semibold">Cancelar</button>
                <button onclick="saveBaseCosts()"
                    class="bg-gradient-to-r from-red-600 to-orange-500 hover:opacity-90 text-white font-bold px-5 py-2 rounded-xl text-xs">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        let flavors = [];
        let currentFilter = 'Todos';
        let baseCosts = null;

        document.addEventListener('DOMContentLoaded', async () => {
            try { await initDb(); }
            catch (e) { showToast('Erro de conexão', 'Falha ao conectar ao servidor.', true); console.error(e); return; }
            onDataChange(() => { flavors = getFlavors(); renderFlavors(); });
            flavors = getFlavors();
            renderFlavors();
            lucide.createIcons();
        });

        function renderFlavors() {
            const grid = document.getElementById('sabores-grid');
            grid.innerHTML = '';

            const searchTerm = document.getElementById('search-input').value.toLowerCase().trim();

            const filtered = flavors.filter(f => {
                const matchesCategory = (currentFilter === 'Todos' || f.category === currentFilter);
                const matchesSearch = f.name.toLowerCase().includes(searchTerm) ||
                    (f.description && f.description.toLowerCase().includes(searchTerm));
                return matchesCategory && matchesSearch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-12 flex flex-col items-center justify-center text-center">
                        <div class="w-16 h-16 bg-brand-card border border-brand-border rounded-full flex items-center justify-center mb-4">
                            <i data-lucide="info" class="w-8 h-8 text-gray-500"></i>
                        </div>
                        <h4 class="text-white font-bold">Nenhum sabor encontrado</h4>
                        <p class="text-gray-400 text-xs mt-1">Experimente buscar por outros termos ou mudar de categoria.</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            filtered.forEach(f => {
                const card = document.createElement('div');
                card.className = `bg-brand-card p-5 rounded-2xl border ${f.available ? 'border-brand-border' : 'border-red-900/40 opacity-75'} flex flex-col justify-between h-full transition-all hover:scale-[1.01] hover:shadow-lg relative overflow-hidden group`;

                let categoryBadgeColor = "bg-red-500/10 text-red-400";
                if (f.category === "Doce")    categoryBadgeColor = "bg-amber-500/10 text-amber-400";
                if (f.category === "Premium") categoryBadgeColor = "bg-purple-500/10 text-purple-400";

                card.innerHTML = `
                    <div class="space-y-3">
                        <div class="flex items-center justify-between">
                            <span class="px-2.5 py-1 text-[10px] rounded-full font-bold uppercase tracking-wider ${categoryBadgeColor}">${escapeHtml(f.category)}</span>
                            <div class="flex items-center gap-2">
                                <span class="text-[11px] ${f.available ? 'text-emerald-500' : 'text-red-500'} font-semibold">
                                    ${f.available ? 'Disponível' : 'Indisponível'}
                                </span>
                                <button onclick="toggleAvailability(${f.id})" title="Alternar Disponibilidade" class="p-1 rounded-lg bg-black/30 hover:bg-black/50 border border-brand-border text-gray-400 hover:text-white transition-all">
                                    <i data-lucide="${f.available ? 'eye' : 'eye-off'}" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                        <div>
                            <h4 class="text-white font-extrabold text-lg mt-1 group-hover:text-brand-accentOrange transition-colors">${escapeHtml(f.name)}</h4>
                            <p class="text-gray-400 text-xs mt-1 leading-relaxed line-clamp-2">${escapeHtml(f.description || 'Nenhum ingrediente listado.')}</p>
                        </div>
                    </div>
                    <div class="mt-6 pt-4 border-t border-brand-border/40 space-y-3">
                        <div class="flex items-center justify-between">
                            <div>
                                <span class="block text-[10px] uppercase font-bold text-gray-500 tracking-wider">Preço</span>
                                <span class="text-brand-accentOrange font-black text-xl">${formatBRL(f.price)}</span>
                            </div>
                            <div class="text-right">
                                <span class="block text-[10px] uppercase font-bold text-gray-500 tracking-wider">Custo</span>
                                <span class="text-gray-300 font-bold text-sm">${formatBRL(f.costPrice || 0)}</span>
                            </div>
                        </div>
                        ${renderMarginBar(f)}
                        <div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 focus-within:opacity-100 transition-all">
                            <button onclick="editFlavorPrice(${f.id})" title="Alterar preço" class="flex-1 p-2 rounded-xl bg-orange-500/10 hover:bg-orange-500/20 border border-orange-500/20 text-orange-400 hover:text-orange-300 transition-all text-xs font-bold">
                                <i data-lucide="pencil" class="w-3.5 h-3.5 inline mr-1"></i>preço
                            </button>
                            <button onclick="editFlavorCost(${f.id})" title="Alterar custo do recheio" class="flex-1 p-2 rounded-xl bg-blue-500/10 hover:bg-blue-500/20 border border-blue-500/20 text-blue-400 hover:text-blue-300 transition-all text-xs font-bold">
                                <i data-lucide="dollar-sign" class="w-3.5 h-3.5 inline mr-1"></i>custo
                            </button>
                            <button onclick="removeFlavor(${f.id})" title="Excluir sabor" class="p-2 rounded-xl bg-red-950/20 hover:bg-red-950/60 border border-red-900/30 text-red-400 hover:text-red-300 transition-all">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        function setCategoryFilter(category) {
            currentFilter = category;
            const buttons = { 'Todos': 'filter-all', 'Salgada': 'filter-salgada', 'Doce': 'filter-doce', 'Premium': 'filter-premium' };
            Object.entries(buttons).forEach(([cat, id]) => {
                const btn = document.getElementById(id);
                if (cat === category) {
                    btn.className = "px-4 py-2 text-xs font-bold rounded-xl transition-all border border-brand-accentOrange bg-brand-accentOrange text-white shrink-0";
                } else {
                    btn.className = "px-4 py-2 text-xs font-bold rounded-xl transition-all border border-brand-border hover:border-gray-500 text-gray-400 hover:text-white shrink-0";
                }
            });
            renderFlavors();
        }

        function filterFlavors() { renderFlavors(); }

        async function toggleAvailability(id) {
            const flavor = flavors.find(f => f.id === id);
            if (!flavor) return;
            const newValue = !flavor.available;
            try {
                await updateFlavor(id, { available: newValue });
                showToast(
                    newValue ? 'Disponível' : 'Indisponível',
                    `${flavor.name} foi atualizado.`,
                    !newValue
                );
            } catch (e) {
                showToast('Erro', e.message, true);
            }
        }

        async function removeFlavor(id) {
            const flavor = flavors.find(f => f.id === id);
            if (!flavor) return;
            if (!confirm(`Excluir o sabor "${flavor.name}" do cardápio?`)) return;
            try {
                await deleteFlavor(id);
                showToast('Sabor removido', `${flavor.name} foi removido do cardápio.`, true);
            } catch (e) {
                showToast('Erro', e.message, true);
            }
        }

        function renderMarginBar(f) {
            const cost = Number(f.costPrice || 0);
            const price = Number(f.price || 0);
            if (cost <= 0) {
                return `<div class="text-[10px] text-gray-500 italic">defina o custo para ver a margem</div>`;
            }
            const marginAbs = price - cost;
            const marginPct = price > 0 ? (marginAbs / price) * 100 : 0;
            let cls = 'text-red-400';
            if (marginPct >= 50) cls = 'text-emerald-400';
            else if (marginPct >= 30) cls = 'text-amber-400';
            return `
                <div class="flex items-center justify-between text-xs">
                    <span class="text-gray-500 uppercase font-bold tracking-wider text-[10px]">Margem</span>
                    <span class="font-bold ${cls}">${formatBRL(marginAbs)} <span class="opacity-70">(${marginPct.toFixed(0)}%)</span></span>
                </div>
            `;
        }

        async function editFlavorPrice(id) {
            const flavor = flavors.find(f => f.id === id);
            if (!flavor) return;
            const newPrice = prompt(`Novo preço de venda para "${flavor.name}"`, flavor.price.toFixed(2));
            if (newPrice === null) return;
            const parsed = parseFloat(String(newPrice).replace(',', '.'));
            if (isNaN(parsed) || parsed <= 0) {
                showToast('Valor inválido', 'Digite um preço válido.', true);
                return;
            }
            try {
                await updateFlavor(id, { price: parsed });
                showToast('Preço atualizado', `${flavor.name} agora custa ${formatBRL(parsed)}`);
            } catch (e) {
                showToast('Erro', e.message, true);
            }
        }

        async function editFlavorCost(id) {
            const flavor = flavors.find(f => f.id === id);
            if (!flavor) return;
            const newCost = prompt(`Custo do recheio de "${flavor.name}"`, Number(flavor.fillingCost || 0).toFixed(2));
            if (newCost === null) return;
            const parsed = parseFloat(String(newCost).replace(',', '.'));
            if (isNaN(parsed) || parsed < 0) {
                showToast('Valor inválido', 'Digite um custo válido (>= 0).', true);
                return;
            }
            try {
                await updateFlavor(id, { fillingCost: parsed });
                showToast('Custo atualizado', `${flavor.name} agora tem recheio ${formatBRL(parsed)}`);
            } catch (e) {
                showToast('Erro', e.message, true);
            }
        }

        function _baseTotalFromInputs() {
            const dough = Number(document.getElementById('base-dough').value) || 0;
            const packaging = Number(document.getElementById('base-packaging').value) || 0;
            const gas = Number(document.getElementById('base-gas').value) || 0;
            return dough + packaging + gas;
        }

        function _renderBaseTotal() {
            document.getElementById('base-total').textContent = formatBRL(_baseTotalFromInputs());
        }

        async function openBaseCostsModal() {
            document.getElementById('modal-base-costs').classList.remove('hidden');
            try {
                baseCosts = await getBaseCosts();
                const byKey = new Map((baseCosts.items || []).map(x => [x.key, x]));
                document.getElementById('base-dough').value = Number((byKey.get('dough') || {}).amount || 0).toFixed(2);
                document.getElementById('base-packaging').value = Number((byKey.get('packaging') || {}).amount || 0).toFixed(2);
                document.getElementById('base-gas').value = Number((byKey.get('gas') || {}).amount || 0).toFixed(2);
                _renderBaseTotal();
            } catch (e) {
                showToast('Erro', e.message, true);
            }
            lucide.createIcons();
        }

        function closeBaseCostsModal() {
            document.getElementById('modal-base-costs').classList.add('hidden');
            lucide.createIcons();
        }

        async function saveBaseCosts() {
            const dough = parseFloat(document.getElementById('base-dough').value);
            const packaging = parseFloat(document.getElementById('base-packaging').value);
            const gas = parseFloat(document.getElementById('base-gas').value);
            if ([dough, packaging, gas].some(v => isNaN(v) || v < 0)) {
                showToast('Erro', 'Valores inválidos.', true);
                return;
            }
            try {
                await updateBaseCosts([
                    { key: 'dough', amount: dough },
                    { key: 'packaging', amount: packaging },
                    { key: 'gas', amount: gas },
                ]);
                _renderBaseTotal();
                showToast('Atualizado', 'Custos base atualizados.');
                closeBaseCostsModal();
            } catch (e) {
                showToast('Erro', e.message, true);
            }
        }

        function openNewFlavorModal() {
            document.getElementById('modal-flavor').classList.remove('hidden');
        }

        function closeNewFlavorModal() {
            document.getElementById('modal-flavor').classList.add('hidden');
            document.getElementById('f-name').value = '';
            document.getElementById('f-price').value = '';
            document.getElementById('f-cost').value = '';
            document.getElementById('f-ingredients').value = '';
        }

        async function submitNewFlavor() {
            const name = document.getElementById('f-name').value.trim();
            const price = parseFloat(document.getElementById('f-price').value);
            const costRaw = document.getElementById('f-cost').value;
            const costPrice = costRaw ? parseFloat(costRaw) : 0;
            const category = document.getElementById('f-category').value;
            const description = document.getElementById('f-ingredients').value.trim();

            if (!name || isNaN(price) || price <= 0) {
                showToast('Erro', 'Informe nome e preço válido.', true);
                return;
            }
            if (isNaN(costPrice) || costPrice < 0) {
                showToast('Erro', 'Custo inválido.', true);
                return;
            }
            try {
                await createFlavor({
                    name,
                    price,
                    fillingCost: costPrice,
                    category,
                    description: description || 'Esfiha preparada na hora com ingredientes frescos.',
                    available: true,
                });
                closeNewFlavorModal();
                showToast('Sucesso', `${name} adicionado ao cardápio!`);
            } catch (e) {
                showToast('Erro', e.message, true);
            }
        }
