<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esfihas Delivery - Pedidos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/db.js"></script>
    <script src="js/sidebar.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#120c08',
                            card: '#1a120e',
                            border: '#2a1e17',
                            accentOrange: '#f97316'
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-brand-dark text-gray-200 font-sans antialiased min-h-screen flex flex-col md:flex-row">

    <!-- BARRA LATERAL -->
    <aside
        class="w-full md:w-64 bg-brand-card border-r border-brand-border flex flex-col justify-between shrink-0 p-5 z-20">
        <div>
            <div class="flex items-center gap-3 mb-8">
                <div
                    class="w-10 h-10 rounded-full bg-gradient-to-br from-red-600 to-orange-500 flex items-center justify-center shadow-lg">
                    <span class="text-white font-black text-xl">S</span>
                </div>
                <div>
                    <span class="text-xs uppercase text-brand-accentOrange tracking-wider font-bold">Esfiha</span>
                    
                </div>
            </div>
            <nav class="space-y-1">
                <a href="index.html"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all font-semibold text-sm">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
                </a>
                <a href="pedidos.html"
                    class="bg-gradient-to-br from-red-600 to-orange-500 text-white w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm">
                    <i data-lucide="shopping-cart" class="w-5 h-5"></i> Pedidos
                </a>
                <a href="cozinha.html"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all font-semibold text-sm">
                    <i data-lucide="chef-hat" class="w-5 h-5"></i> Cozinha
                </a>
                <a href="sabores.html"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all font-semibold text-sm">
                    <i data-lucide="pizza" class="w-5 h-5"></i> Sabores
                </a>
                <a href="clientes.html"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all font-semibold text-sm">
                    <i data-lucide="users" class="w-5 h-5"></i> Clientes
                </a>
                <a href="relatorios.html"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all font-semibold text-sm">
                    <i data-lucide="bar-chart-3" class="w-5 h-5"></i> Relatórios
                </a>
                <a href="financeiro.html"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white hover:bg-white/5 transition-all font-semibold text-sm">
                    <i data-lucide="dollar-sign" class="w-5 h-5"></i> Financeiro
                </a>
            </nav>
        </div>
    </aside>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="flex-1 p-6 md:p-8 overflow-y-auto max-h-screen space-y-6">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
            <div>
                <h2 class="text-2xl font-black text-white">Controle de Pedidos</h2>
            <p class="text-gray-400 text-sm">Histórico e gestão do progresso operacional.</p>
            </div>
            <button onclick="exportFilteredOrdersPdf()"
                class="inline-flex items-center justify-center gap-2 bg-brand-accentOrange hover:bg-orange-600 text-white rounded-xl px-4 py-2.5 text-xs font-black uppercase tracking-wider transition-all shadow-lg shadow-orange-950/30">
                <i data-lucide="download" class="w-4 h-4"></i>
                Exportar PDF
            </button>
        </div>

        <!-- BARRA DE FILTROS -->
        <div class="bg-brand-card p-4 rounded-2xl border border-brand-border space-y-3">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-3">
                <!-- Busca -->
                <div class="md:col-span-5 relative">
                    <i data-lucide="search" class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 w-4 h-4"></i>
                    <input type="text" id="filter-search" oninput="applyFilters()"
                        placeholder="Buscar por ID, cliente, telefone, bairro..."
                        class="w-full bg-brand-dark border border-brand-border rounded-xl pl-10 pr-4 py-2.5 text-white focus:outline-none focus:border-brand-accentOrange text-sm transition-all">
                </div>

                <!-- Status -->
                <div class="md:col-span-3">
                    <select id="filter-status" onchange="applyFilters()"
                        class="w-full bg-brand-dark border border-brand-border rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-brand-accentOrange text-sm">
                        <option value="all">Todos os status</option>
                        <option value="Pendente">Pendente</option>
                        <option value="Em Preparo">Em Preparo</option>
                        <option value="Pronto">Pronto</option>
                        <option value="Entregue">Entregue</option>
                        <option value="Cancelado">Cancelado</option>
                        <option value="active">Em andamento (não finalizados)</option>
                    </select>
                </div>

                <!-- Período -->
                <div class="md:col-span-2">
                    <select id="filter-period" onchange="applyFilters()"
                        class="w-full bg-brand-dark border border-brand-border rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-brand-accentOrange text-sm">
                        <option value="today">Hoje</option>
                        <option value="7d">Últimos 7 dias</option>
                        <option value="30d" selected>Últimos 30 dias</option>
                        <option value="all">Tudo</option>
                    </select>
                </div>

                <!-- Origem -->
                <div class="md:col-span-2">
                    <select id="filter-source" onchange="applyFilters()"
                        class="w-full bg-brand-dark border border-brand-border rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-brand-accentOrange text-sm">
                        <option value="all">Todas as origens</option>
                    </select>
                </div>
            </div>

            <div class="flex items-center justify-between gap-3">
                <button onclick="clearFilters()"
                    class="border border-brand-border text-gray-400 hover:text-white hover:bg-white/5 rounded-xl px-4 py-2 text-xs font-semibold transition-all">
                    Limpar filtros
                </button>
            </div>

            <!-- Sumário -->
            <div class="flex items-center justify-between text-xs text-gray-500 pt-1">
                <span id="filter-summary">—</span>
                <span id="filter-total" class="font-bold text-brand-accentOrange">—</span>
            </div>
        </div>

        <div class="bg-brand-card rounded-2xl border border-brand-border overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-black/20 text-xs font-bold uppercase text-gray-400 border-b border-brand-border">
                            <th class="py-4 px-6 w-64">Pedido</th>
                            <th class="py-4 px-6">Itens</th>
                            <th class="py-4 px-6 w-36 text-right">Valores</th>
                            <th class="py-4 px-6 w-40">Caixa</th>
                            <th class="py-4 px-6 text-right">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="table-pedidos-body" class="divide-y divide-brand-border/40 text-sm"></tbody>
                </table>
                <div id="table-pedidos-empty" class="hidden py-12 flex flex-col items-center justify-center text-center">
                    <div class="w-12 h-12 rounded-full bg-brand-border/40 flex items-center justify-center mb-3">
                        <i data-lucide="search-x" class="w-5 h-5 text-gray-500"></i>
                    </div>
                    <p class="text-sm text-gray-400">Nenhum pedido encontrado com esses filtros.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        let orders = [];
        let flavors = [];

        document.addEventListener('DOMContentLoaded', async () => {
            try { await initDb(); }
            catch (e) { showToast('Erro de conexão', 'Falha ao conectar ao servidor.', true); console.error(e); return; }
            onDataChange(() => {
                orders = getOrders();
                flavors = getFlavors();
                refreshSourceOptions();
                renderTable();
            });
            orders = getOrders();
            flavors = getFlavors();
            refreshSourceOptions();
            renderTable();
            lucide.createIcons();
        });

        function getFilters() {
            return {
                search: (document.getElementById('filter-search').value || '').toLowerCase().trim(),
                status: document.getElementById('filter-status').value,
                period: document.getElementById('filter-period').value,
                source: document.getElementById('filter-source').value,
            };
        }

        function applyFilters() { renderTable(); }

        function clearFilters() {
            document.getElementById('filter-search').value = '';
            document.getElementById('filter-status').value = 'all';
            document.getElementById('filter-period').value = '30d';
            document.getElementById('filter-source').value = 'all';
            renderTable();
        }

        function refreshSourceOptions() {
            const select = document.getElementById('filter-source');
            const currentValue = select.value;
            const knownSources = Array.from(new Set(orders.map(o => o.source).filter(Boolean))).sort();
            select.innerHTML = `<option value="all">Todas as origens</option>
                <option value="__empty__">— sem origem informada —</option>
                ${knownSources.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('')}`;
            // Preserva seleção quando possível
            if ([...select.options].some(o => o.value === currentValue)) select.value = currentValue;
        }

        function filterOrders(list) {
            const { search, status, period, source } = getFilters();

            // Período
            let cutoff = null;
            if (period !== 'all') {
                cutoff = new Date();
                cutoff.setHours(0, 0, 0, 0);
                if (period === '7d')  cutoff.setDate(cutoff.getDate() - 6);
                if (period === '30d') cutoff.setDate(cutoff.getDate() - 29);
            }

            return list.filter(o => {
                if (cutoff && new Date(o.createdAt) < cutoff) return false;

                if (status !== 'all') {
                    if (status === 'active') {
                        if (o.status === 'Entregue' || o.status === 'Cancelado') return false;
                    } else if (o.status !== status) {
                        return false;
                    }
                }

                if (source !== 'all') {
                    if (source === '__empty__') {
                        if (o.source) return false;
                    } else if (o.source !== source) {
                        return false;
                    }
                }

                if (search) {
                    const haystack = [
                        o.id, o.customer, o.phone, o.address, o.neighborhood, o.payment, o.notes,
                        ...(o.items || []).map(i => i.name)
                    ].join(' ').toLowerCase();
                    if (!haystack.includes(search)) return false;
                }
                return true;
            });
        }

        function renderTable() {
            const tbody = document.getElementById('table-pedidos-body');
            const empty = document.getElementById('table-pedidos-empty');
            const summary = document.getElementById('filter-summary');
            const totalEl = document.getElementById('filter-total');
            tbody.innerHTML = '';

            const filtered = filterOrders(orders);

            // Sumário
            const filters = getFilters();
            const parts = [];
            const periodLabel = { today: 'hoje', '7d': 'últimos 7 dias', '30d': 'últimos 30 dias', all: 'todo o histórico' }[filters.period];
            parts.push(`Período: ${periodLabel}`);
            if (filters.status !== 'all') parts.push(`Status: ${filters.status === 'active' ? 'em andamento' : filters.status}`);
            if (filters.source !== 'all') parts.push(`Origem: ${filters.source === '__empty__' ? 'sem origem' : filters.source}`);
            if (filters.search) parts.push(`Busca: "${filters.search}"`);
            summary.textContent = parts.join(' · ');
            totalEl.textContent = `${filtered.length} pedido${filtered.length === 1 ? '' : 's'} · ` +
                formatBRL(filtered.reduce((acc, o) => acc + (o.total || 0), 0));

            if (filtered.length === 0) {
                empty.classList.remove('hidden');
                empty.classList.add('flex');
                lucide.createIcons();
                return;
            }
            empty.classList.add('hidden');
            empty.classList.remove('flex');

            filtered.slice().reverse().forEach(o => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-white/5 transition-all";

                const itemsList = o.items.map(item => {
                    // Resolve nome/preço atual: prioriza cadastro atual (por flavorId), com fallback ao snapshot
                    const flavor = flavors.find(f => f.id === item.flavorId);
                    const flavorName  = flavor ? flavor.name  : (item.name  || 'Sabor removido');
                    const currentPrice = flavor ? flavor.price : (item.price || 0);
                    return `<li class="text-white font-semibold leading-snug break-words">${item.quantity}x ${escapeHtml(flavorName)}</li>`;
                }).join('');

                // Total: usa snapshot do pedido para histórico imutável
                const total = o.total != null
                    ? o.total
                    : o.items.reduce((acc, i) => acc + ((i.price || 0) * i.quantity), 0);

                let actionBtn;
                if (o.status === 'Cancelado' || o.status === 'Entregue') {
                    actionBtn = `<button onclick="reopen('${escapeHtml(o.id)}')" class="text-amber-400 hover:text-amber-300 text-xs font-bold" title="Reabrir como Pendente">Reabrir</button>`;
                } else {
                    actionBtn = `<button onclick="cancelOrder('${escapeHtml(o.id)}')" class="text-red-400 hover:text-red-500 text-xs font-bold">Cancelar</button>`;
                }

                const sourceBadge = o.source
                    ? `<span class="text-[10px] uppercase font-bold tracking-wider text-purple-300 bg-purple-500/10 border border-purple-500/20 px-2 py-0.5 rounded">${escapeHtml(o.source)}</span>`
                    : `<span class="text-[10px] text-gray-600 italic">—</span>`;

                const usedBox = o.caixaUtilizada || o.caixaSugerida || 'Média';
                const boxChanged = usedBox !== o.caixaSugerida;
                let boxClass = boxChanged ? 'text-amber-300 bg-amber-500/10 border-amber-500/20' : 'text-emerald-300 bg-emerald-500/10 border-emerald-500/20';
                if (usedBox === 'Sem Caixa') boxClass = 'text-gray-300 bg-gray-500/10 border-gray-500/20';
                const boxDisplay = usedBox === 'Sem Caixa'
                    ? `<span class="text-xs font-bold text-gray-400">${escapeHtml(usedBox)}</span>`
                    : `<span class="px-2 py-1 rounded border ${boxClass} font-bold text-xs">${escapeHtml(usedBox)}</span>`;

                tr.innerHTML = `
                    <td class="py-4 px-6 align-top">
                        <div class="font-black text-brand-accentOrange">${escapeHtml(o.id)}</div>
                        ${o.atCost ? '<div class="text-[10px] font-black text-amber-400 uppercase mt-1">Preço de custo</div>' : ''}
                        <div class="text-white font-bold mt-1">${escapeHtml(o.customer)}</div>
                        <div class="text-xs text-gray-500 font-normal">${escapeHtml(formatPhone(o.phone))}</div>
                    </td>
                    <td class="py-4 px-6 align-top">
                        <ul class="space-y-1">${itemsList}</ul>
                    </td>
                    <td class="py-4 px-6 align-top text-right">
                        <div class="text-[10px] uppercase font-bold text-gray-500">Entrega</div>
                        <div class="font-bold text-gray-300">${formatBRL(o.deliveryFee || 0)}</div>
                        <div class="text-[10px] uppercase font-bold text-gray-500 mt-2">Total</div>
                        <div class="font-black text-brand-accentOrange">${formatBRL(total)}</div>
                    </td>
                    <td class="py-4 px-6 align-top">
                        ${boxDisplay}
                        <span class="block text-[10px] text-gray-500 mt-1">Sug.: ${escapeHtml(o.caixaSugerida || 'Média')}</span>
                    </td>
                    <td class="py-4 px-6 text-right align-top">${actionBtn}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function exportFilteredOrdersPdf() {
            const filtered = filterOrders(orders).slice().reverse();
            if (!filtered.length) {
                showToast('Sem pedidos', 'Nenhum pedido encontrado para exportar.', true);
                return;
            }

            const filters = getFilters();
            const periodLabel = { today: 'Hoje', '7d': 'Ultimos 7 dias', '30d': 'Ultimos 30 dias', all: 'Todo o historico' }[filters.period];
            const total = filtered.reduce((acc, o) => acc + (o.total || 0), 0);
            const rows = filtered.map(o => {
                const items = (o.items || []).map(item => {
                    const flavor = flavors.find(f => f.id === item.flavorId);
                    const name = flavor ? flavor.name : (item.name || 'Sabor removido');
                    const price = flavor ? flavor.price : (item.price || 0);
                    return `${item.quantity}x ${escapeHtml(name)} (${escapeHtml(formatBRL(price))} cada)`;
                }).join('<br>');
                const orderTotal = o.total != null
                    ? o.total
                    : (o.items || []).reduce((acc, i) => acc + ((i.price || 0) * i.quantity), 0);

                return `
                    <tr>
                        <td>${escapeHtml(o.id)}</td>
                        <td>${escapeHtml(formatPdfDate(o.createdAt))}</td>
                        <td>
                            <strong>${escapeHtml(o.customer)}</strong><br>
                            <span>${escapeHtml(formatPhone(o.phone))}</span><br>
                            <span>${escapeHtml(o.neighborhood || '')}</span>
                        </td>
                        <td>${items}</td>
                        <td>${escapeHtml(o.payment || '')}</td>
                        <td>${escapeHtml(o.status || '')}</td>
                        <td>${escapeHtml(o.source || '')}</td>
                        <td class="money">${escapeHtml(formatBRL(o.deliveryFee || 0))}</td>
                        <td class="money">${escapeHtml(formatBRL(o.discount || 0))}</td>
                        <td class="money total">${escapeHtml(formatBRL(orderTotal))}</td>
                    </tr>
                `;
            }).join('');

            const report = window.open('', '_blank');
            if (!report) {
                showToast('Bloqueado', 'Permita pop-ups para gerar o PDF.', true);
                return;
            }

            report.document.write(`
                <!DOCTYPE html>
                <html lang="pt-BR">
                <head>
                    <meta charset="UTF-8">
                    <title>Pedidos - PDF</title>
                    <style>
                        * { box-sizing: border-box; }
                        body { font-family: Arial, sans-serif; color: #111827; margin: 24px; }
                        h1 { font-size: 22px; margin: 0 0 6px; }
                        .muted { color: #6b7280; font-size: 12px; }
                        .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 18px 0; }
                        .box { border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px; }
                        .box strong { display: block; font-size: 16px; margin-top: 3px; }
                        table { width: 100%; border-collapse: collapse; font-size: 10px; }
                        th { background: #f3f4f6; text-align: left; text-transform: uppercase; font-size: 9px; color: #4b5563; }
                        th, td { border: 1px solid #e5e7eb; padding: 7px; vertical-align: top; }
                        .money { text-align: right; white-space: nowrap; }
                        .total { font-weight: 700; }
                        @media print {
                            body { margin: 12mm; }
                            button { display: none; }
                            tr { break-inside: avoid; }
                        }
                    </style>
                </head>
                <body>
                    <h1>Controle de Pedidos</h1>
                    <p class="muted">Exportado em ${escapeHtml(new Date().toLocaleString('pt-BR'))}</p>
                    <div class="summary">
                        <div class="box">Periodo<strong>${escapeHtml(periodLabel)}</strong></div>
                        <div class="box">Pedidos<strong>${filtered.length}</strong></div>
                        <div class="box">Total<strong>${escapeHtml(formatBRL(total))}</strong></div>
                    </div>
                    <p class="muted">
                        Status: ${escapeHtml(filters.status === 'all' ? 'Todos' : filters.status)} |
                        Origem: ${escapeHtml(filters.source === 'all' ? 'Todas' : (filters.source === '__empty__' ? 'Sem origem' : filters.source))} |
                        Busca: ${escapeHtml(filters.search || 'Sem busca')}
                    </p>
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Data</th>
                                <th>Cliente</th>
                                <th>Itens</th>
                                <th>Pagamento</th>
                                <th>Status</th>
                                <th>Origem</th>
                                <th>Taxa</th>
                                <th>Desconto</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                    <script>
                        window.onload = () => {
                            window.print();
                            setTimeout(() => window.close(), 500);
                        };
                    <\/script>
                </body>
                </html>
            `);
            report.document.close();
            showToast('PDF pronto', 'Escolha "Salvar como PDF" na janela de impressao.');
        }

        function formatPdfDate(value) {
            if (!value) return '';
            const d = new Date(value);
            if (Number.isNaN(d.getTime())) return '';
            return d.toLocaleString('pt-BR');
        }

        async function cancelOrder(id) {
            if (!confirm(`Cancelar o pedido ${id}?`)) return;
            try {
                await updateOrder(id, { status: 'Cancelado' });
                showToast('Cancelado', `Pedido ${id} cancelado.`);
            } catch (e) {
                showToast('Erro', e.message, true);
            }
        }

        async function reopen(id) {
            if (!confirm(`Reabrir o pedido ${id}? Ele voltará para Pendente.`)) return;
            try {
                await updateOrder(id, { status: 'Pendente' });
                showToast('Reaberto', `Pedido ${id} voltou para Pendente.`);
            } catch (e) {
                showToast('Erro', e.message, true);
            }
        }
    </script>
</body>

</html>
